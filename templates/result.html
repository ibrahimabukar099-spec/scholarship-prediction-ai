<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Natiijada AI</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { background: #f8f9fa; padding: 40px; }
        .card { border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); border: none; }
        .status-1 { color: #198754; font-weight: bold; }
        .status-0 { color: #dc3545; font-weight: bold; }
        @media print { .no-print { display: none; } }
    </style>
</head>
<body>

<div class="container" id="printable-area">
    <div class="card p-5 bg-white">
        <div class="text-center mb-4">
            <h2>Warbixinta Deeqda Waxbarasho (AI)</h2>
            <hr>
        </div>

        <div class="row">
            <div class="col-md-6 border-end">
                <h4>Xogta Codsadaha</h4>
                <p><strong>Magaca:</strong> {{ s.magaca }}</p>
                <p><strong>GPA:</strong> {{ s.gpa }}%</p>
                <p><strong>Natiijada:</strong> 
                    <span class="status-{{ s.prediction_result }}">
                        {{ 'Waa Lagu Aqbalay' if s.prediction_result == 1 else 'Lama Aqbalin' }}
                    </span>
                </p>
                <div class="alert alert-light border mt-3">
                    <strong>Sababta:</strong> {{ s.reason }}
                </div>
            </div>
            <div class="col-md-6">
                <canvas id="resultChart"></canvas>
            </div>
        </div>

        <div class="mt-5 text-center no-print">
            <button onclick="downloadPDF()" class="btn btn-danger btn-lg me-2">Degso Warqadda PDF</button>
            <a href="/apply_now" class="btn btn-primary btn-lg">Codsi Cusub</a>
        </div>
    </div>
</div>

<script>
    const ctx = document.getElementById('resultChart').getContext('2d');
    new Chart(ctx, {
        type: 'radar',
        data: {
            labels: ['GPA', 'Dakhliga', 'Agoonnimo', 'Barakac'],
            datasets: [{
                label: 'Dhibcahaaga',
                data: [{{ s.gpa }}, ({{ s.family_income }} / 10), {{ s.is_orphan * 100 }}, {{ s.is_displaced * 100 }}],
                backgroundColor: 'rgba(13, 110, 253, 0.2)',
                borderColor: '#0d6efd',
                borderWidth: 2
            }]
        },
        options: { scales: { r: { min: 0, max: 100 } } }
    });

    function downloadPDF() {
        const element = document.getElementById('printable-area');
        const opt = {
            margin: 0.5,
            filename: 'Scholarship_Result.pdf',
            html2canvas: { scale: 2 },
            jsPDF: { unit: 'in', format: 'letter', orientation: 'portrait' }
        };
        html2pdf().set(opt).from(element).save();
    }
</script>
</body>
</html>
